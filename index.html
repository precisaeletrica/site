<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precisa - Catálogo Técnico Elétrico</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Chivo:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style.css">
    
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <div class="print-header">
        <div class="print-brand">
            <h1>PRECISA</h1>
            <p>Elétrica • Hidráulica • Eletrônica</p>
        </div>
        <div class="print-info">
            <p>CATÁLOGO TÉCNICO DE PRODUTOS</p>
            <p>Data: 24/03/2026</p>
        </div>
    </div>
    <header class="navbar">
        <div class="logo-area">
            <div class="brand-container">
                <span class="brand-main">PRECISA</span>
                <span class="brand-sub">Elétrica • Hidráulica • Eletrônica</span>
            </div>
        </div>
        
        <nav class="main-nav">
            <div class="search-box">
                <input type="text" id="inputBusca" placeholder="Buscar por código ou nome...">
            </div>
            <ul class="main-menu-lista">
                <li><a href="index.html">Produtos</a></li>
                <li><a href="about.html">A Empresa</a></li>
                <li><a href="contact.html">Localização</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <div class="produtos-tecnicos-grid" id="catalogoProdutos">
            <h3 class="loading-msg">Carregando especificações técnicas...</h3>
        </div>

        <div id="imageModal" class="modal">
            <span class="close-modal">&times;</span>
            <img class="modal-content" id="expandedImg">
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <p>&copy; 2026 Precisa Elétrica. Catálogo para fins de consulta técnica.</p>
            <button onclick="window.print()" class="btn-print">📄 Gerar PDF / Imprimir</button>
        </div>
    </footer>

<script>
    fetch('dados/produtos.json')
        .then(res => res.json())
        .then(data => {
            const produtos = data.itens || [];
            const container = document.getElementById('catalogoProdutos');
            
            if(produtos.length === 0) {
                container.innerHTML = '<h3>Nenhum produto cadastrado.</h3>';
                return;
            }

            let htmlFinal = '';

            produtos.forEach(prod => {
                let linhasTabela = '';
                if(prod.especificacoes) {
                    prod.especificacoes.forEach(spec => {
                        linhasTabela += `
                            <tr>
                                <td>${spec.codigo || '-'}</td>
                                <td>${spec.descricao || '-'}</td>
                                <td>${spec.embalagem || 'PT 1'}</td>
                            </tr>`;
                    });
                }

                // Placeholder online para não ficar vazio
                const imagemExibir = prod.imagem && !prod.imagem.includes('abracadeira.jpg') 
                    ? prod.imagem 
                    : 'https://via.placeholder.com/350x250.png?text=FOTO+PRODUTO';

                htmlFinal += `
                <div class="card-tecnico">
                    <span class="categoria-oculta" style="display:none;">${prod.categoria}</span>
                    
                    <div class="card-header">
                        <h2>${prod.titulo}</h2>
                    </div>
                    <div class="card-body-vertical">
                        <div class="product-visual-central">
                            <img src="${imagemExibir}" alt="${prod.titulo}">
                        </div>
                        <div class="product-data-full">
                            <table class="tabela-tecnica">
                                <thead>
                                    <tr>
                                        <th>CÓDIGO</th>
                                        <th>DESCRIÇÃO / MEDIDA</th>
                                        <th>EMB.</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${linhasTabela}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>`;
            });

            container.innerHTML = htmlFinal;
            configurarBusca();
        });

    function configurarBusca() {
        const input = document.getElementById('inputBusca');
        input.addEventListener('keyup', () => {
            const termo = input.value.toLowerCase();
            const cards = document.querySelectorAll('.card-tecnico');
            
            cards.forEach(card => {
                const texto = card.innerText.toLowerCase();
                card.style.display = texto.includes(termo) ? 'block' : 'none';
            });
        });
    }
</script>
</body>
</html>
